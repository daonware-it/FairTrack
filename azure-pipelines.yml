# CI/CD für FairTrack: prüfen, signiert bauen, für Google Play bereitstellen.
#
# Voraussetzungen in Azure DevOps (einmalig, siehe docs/azure-pipelines.md):
#   1. Library > Secure files: Upload-Keystore als `fairtrack-upload-keystore.jks`
#   2. Library > Variable groups: Gruppe `fairtrack-signing` mit den als *secret*
#      markierten Variablen KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
#
# Ergebnis: signiertes APK (Direktinstallation/Tester) und signiertes AAB
# (Upload zu Google Play, das dort per Play App Signing neu signiert wird).
#
# Jira (Projekt FAIR): Die Deploy-Stage läuft als Deployment-Job gegen das
# Environment `fairtrack-production`. Mit installierter "Azure Pipelines for
# Jira"-App meldet Azure DevOps solche Deployments an Jira; verknüpft wird
# über Issue-Keys (FAIR-123) in den Commit-Messages.

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'

# Auf PRs läuft nur Verify: Der Build braucht Signing-Secrets, und die gibt
# Azure DevOps einem PR aus einem Fork nicht heraus.
pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: fairtrack-signing
  - name: GRADLE_USER_HOME
    value: $(Pipeline.Workspace)/.gradle

stages:
  - stage: Verify
    displayName: Tests und Analyse
    jobs:
      # Tests und Lint laufen als getrennte Jobs, damit ein Lint-Befund nicht
      # verdeckt, welche Tests gefallen wären - beide Berichte liegen am Ende vor.
      - job: UnitTests
        displayName: Unit-Tests
        steps:
          - template: .azure/steps-android-setup.yml

          - script: ./gradlew --no-daemon testDebugUnitTest
            displayName: Unit-Tests ausführen

          # condition: always() - gerade der rote Lauf soll seinen Bericht abliefern.
          - task: PublishTestResults@2
            displayName: Testergebnisse veröffentlichen
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'app/build/test-results/testDebugUnitTest/TEST-*.xml'
              testRunTitle: 'Unit-Tests (debug)'
              failTaskOnFailedTests: true

          - script: ./gradlew --stop || true
            displayName: Gradle-Daemon stoppen
            condition: always()

      - job: StaticAnalysis
        displayName: Android Lint
        steps:
          - template: .azure/steps-android-setup.yml

          # lint.abortOnError=true (build.gradle.kts) laesst den Task bei Fehlern
          # kippen; der Bericht wird trotzdem geschrieben und unten eingesammelt.
          - script: ./gradlew --no-daemon lintDebug
            displayName: Lint ausführen

          - task: PublishPipelineArtifact@1
            displayName: Lint-Bericht veröffentlichen
            condition: always()
            inputs:
              targetPath: app/build/reports
              artifact: fairtrack-lint-report

          - script: ./gradlew --stop || true
            displayName: Gradle-Daemon stoppen
            condition: always()

  - stage: Build
    displayName: Release bauen
    dependsOn: Verify
    # Signing-Secrets gibt es im PR-Kontext nicht; der Build wuerde unsigniert
    # und damit still nutzlos durchlaufen.
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BuildRelease
        displayName: Signiertes APK + AAB
        steps:
          - template: .azure/steps-android-setup.yml

          - task: DownloadSecureFile@1
            name: keystoreFile
            displayName: Upload-Keystore laden
            inputs:
              secureFile: fairtrack-upload-keystore.jks

          # Secret-Variablen werden von Azure DevOps bewusst NICHT automatisch in die
          # Umgebung gespiegelt – sie müssen hier explizit durchgereicht werden.
          - script: |
              set -euo pipefail
              ./gradlew --no-daemon assembleRelease bundleRelease
            displayName: Release bauen und signieren
            env:
              KEYSTORE_FILE: $(keystoreFile.secureFilePath)
              KEYSTORE_PASSWORD: $(KEYSTORE_PASSWORD)
              KEY_ALIAS: $(KEY_ALIAS)
              KEY_PASSWORD: $(KEY_PASSWORD)

          # Ein unsigniertes Artefakt wäre sonst still erfolgreich – hier bricht es ab.
          - script: |
              set -euo pipefail
              APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort | tail -1)"
              "$APKSIGNER" verify --verbose --print-certs \
                app/build/outputs/apk/release/app-release.apk
            displayName: APK-Signatur verifizieren

          # Ein AAB ist ein Jar: jarsigner prueft die Signatur, apksigner kann es nicht.
          # Ohne diesen Schritt faellt eine fehlende AAB-Signatur erst im Play-Upload auf.
          #
          # Kein -strict: Bei einem AAB macht das aus jarsigners harmlosem Hinweis
          # "signed in JarFile but not in JarInputStream" einen Fehler. Und
          # -J-Duser.language=en nagelt die Sprache der Meldung fest, damit das
          # grep unten nicht auf einem deutschen Agenten still danebengreift.
          - script: |
              set -euo pipefail
              aab_check="$(jarsigner -J-Duser.language=en -verify \
                app/build/outputs/bundle/release/app-release.aab)"
              if ! grep -q 'jar verified' <<< "$aab_check"; then
                echo "$aab_check" | tail -5
                echo "##vso[task.logissue type=error]AAB ist nicht signiert"
                exit 1
              fi
              echo "AAB: jar verified"
            displayName: AAB-Signatur verifizieren

          # versionCode gegen den Tag halten: Ein Tag v1.0.1 auf einem Commit mit
          # altem versionCode wuerde erst die Play Console ablehnen - hier faellt es
          # in Sekunden auf statt nach dem Upload.
          - script: |
              set -euo pipefail
              VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
              TAG="${BUILD_SOURCEBRANCHNAME}"
              echo "versionName=$VERSION_NAME tag=$TAG"
              if [ "v$VERSION_NAME" != "$TAG" ]; then
                echo "##vso[task.logissue type=error]Tag $TAG passt nicht zu versionName $VERSION_NAME"
                exit 1
              fi
            displayName: versionName gegen Release-Tag prüfen
            condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

          - task: PublishPipelineArtifact@1
            displayName: APK veröffentlichen
            inputs:
              targetPath: app/build/outputs/apk/release/app-release.apk
              artifact: fairtrack-apk

          - task: PublishPipelineArtifact@1
            displayName: AAB veröffentlichen
            inputs:
              targetPath: app/build/outputs/bundle/release/app-release.aab
              artifact: fairtrack-aab

          # ProGuard/R8-Mapping: Ohne die Datei sind Play-Console-Crashes nicht lesbar.
          - task: PublishPipelineArtifact@1
            displayName: R8-Mapping veröffentlichen
            inputs:
              targetPath: app/build/outputs/mapping/release/mapping.txt
              artifact: fairtrack-mapping

          # Verhindert, dass der Daemon den Cache mit veränderlichen Lockfiles vergiftet.
          - script: ./gradlew --stop || true
            displayName: Gradle-Daemon stoppen
            condition: always()

  # Läuft nur für Release-Tags (v*). Als Deployment-Job gegen ein Environment,
  # damit die Jira-Integration den Lauf als Deployment im Projekt FAIR anzeigt.
  - stage: Deploy
    displayName: Production-Deployment
    dependsOn: Build
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - deployment: DeployProduction
        displayName: Release für Google Play bereitstellen
        environment: fairtrack-production
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: fairtrack-aab
                  displayName: AAB abholen
                - download: current
                  artifact: fairtrack-mapping
                  displayName: R8-Mapping abholen
                - script: |
                    set -euo pipefail
                    echo "Release $(Build.SourceBranchName) bereit für den Play-Console-Upload:"
                    ls -la "$(Pipeline.Workspace)/fairtrack-aab"
                    ls -la "$(Pipeline.Workspace)/fairtrack-mapping"
                  displayName: Deployment protokollieren
