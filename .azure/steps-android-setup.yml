# Gemeinsame Vorbereitung für jeden Job, der Gradle aufruft: JDK, Android SDK,
# Gradle-Cache. Als Template ausgelagert, weil Verify- und Build-Stage in
# getrennten Jobs laufen und ein Job nichts vom Workspace des anderen sieht.

steps:
  - checkout: self
    fetchDepth: 1

  # Gradle 9.6 und AGP 9 verlangen mindestens JDK 17.
  - task: JavaToolInstaller@0
    displayName: JDK 17 auswählen
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: x64
      jdkSourceOption: PreInstalled

  # Der Agent bringt nicht zwingend genau das compileSdk mit.
  - script: |
      set -euo pipefail
      SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
      yes | "$SDKMANAGER" --licenses > /dev/null
      "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" > /dev/null
    displayName: Android SDK Platform 36 installieren

  # Beschleunigt Folgeläufe; der Key hängt an Wrapper- und Dependency-Definition.
  - task: Cache@2
    displayName: Gradle-Cache
    inputs:
      key: 'gradle | "$(Agent.OS)" | gradle/wrapper/gradle-wrapper.properties, gradle/libs.versions.toml'
      restoreKeys: |
        gradle | "$(Agent.OS)"
      path: $(GRADLE_USER_HOME)

  - script: chmod +x ./gradlew
    displayName: Gradle-Wrapper ausführbar machen
