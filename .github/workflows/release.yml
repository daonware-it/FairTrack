# Builds a signed APK + AAB and publishes them as a GitHub Release.
#
# Trigger it either way:
#   - push a tag `v1.2.3`
#   - or run it by hand from the Actions tab, passing the tag to release
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   KEYSTORE_BASE64    base64 of upload-keystore.jks  (see docs/azure-pipelines.md)
#   KEYSTORE_PASSWORD  store password
#   KEY_ALIAS          key alias
#   KEY_PASSWORD       key password
#
# The APK is signed with the *upload* key. Google Play re-signs installs with the
# Play App Signing key, so a sideloaded APK and a Play install can never update
# one another. That caveat is repeated in the release body for users.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v1.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

# Two runs publishing the same tag would race over the release assets.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      # Fail before doing 10 minutes of work if signing material is missing:
      # an unsigned APK would otherwise build fine and reach users as a dud.
      - name: Check signing secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [ -z "${!name}" ] && missing="$missing $name"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secret(s):$missing"
            exit 1
          fi

      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Fails the build if gradle-wrapper.jar was tampered with.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The runner image does not necessarily ship the exact compileSdk.
      - name: Install Android SDK platform 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" > /dev/null

      # A tag pointing at a commit with a stale versionName would only be caught
      # by the Play Console, long after the release is public.
      - name: Check versionName matches the tag
        run: |
          version_name="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          echo "versionName=$version_name tag=$TAG"
          if [ "v$version_name" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match versionName $version_name"
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Run Android Lint
        run: ./gradlew --no-daemon lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*

      # Written outside the workspace so it can never be picked up by a build
      # step, an artifact upload, or a stray `git add`.
      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed APK and AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      # Without this an unsigned artifact sails through and only fails on the
      # user's device (APK) or at the Play upload (AAB).
      - name: Verify signatures
        run: |
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)"
          "$apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk
          jarsigner -verify -strict \
            app/build/outputs/bundle/release/app-release.aab

      - name: Shred the keystore
        if: always()
        run: shred -u "$RUNNER_TEMP/upload-keystore.jks" 2>/dev/null || true

      # Named after the tag so a downloaded file still says which build it is.
      - name: Name the artifacts after the release
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/FairTrack-$TAG.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/FairTrack-$TAG.aab"
          # R8 mapping: without it, Play Console crash reports stay obfuscated.
          cp app/build/outputs/mapping/release/mapping.txt "dist/mapping-$TAG.txt"
          sha256sum dist/* > "dist/checksums-$TAG.txt"
          cat "dist/checksums-$TAG.txt"

      # `gh` ships on the runner, so no third-party action gets access to the
      # freshly signed binaries. --notes-file keeps the body out of the YAML.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          cat > release-notes.md <<'NOTES'
          ## Installation

          Lade `FairTrack-<version>.apk` herunter und installiere sie direkt.

          Das APK ist mit dem Upload-Schlüssel signiert, nicht mit dem Schlüssel,
          den Google Play verteilt — ein sideloadetes APK lässt sich daher **nicht**
          durch ein Play-Update ersetzen und umgekehrt. Wer die App aus dem Play
          Store bezieht, sollte sie auch von dort aktualisieren.

          `FairTrack-<version>.aab` ist für den Play-Console-Upload, `mapping-<version>.txt`
          entschlüsselt die Crash-Reports. Beide werden von Endnutzern nicht gebraucht.
          NOTES

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — replacing its assets."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "FairTrack ${TAG#v}" \
              --generate-notes \
              --notes-file release-notes.md \
              --verify-tag \
              $PRERELEASE
          fi
