# Builds a signed APK + AAB and publishes them as a GitHub Release.
#
# Trigger it either way:
#   - push a tag `v1.2.3`
#   - or run it by hand from the Actions tab, passing the tag to release
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   KEYSTORE_BASE64    base64 of github-testing-keystore.jks
#   KEYSTORE_PASSWORD  store password
#   KEY_ALIAS          key alias (fairtrack-testing)
#   KEY_PASSWORD       key password
#
# This is a *testing* key, deliberately not the Play upload key: that one lives
# only on the maintainer's machine and in the Azure secure files, so a leak here
# cannot cost us the Play listing. The AAB this workflow builds is therefore not
# uploadable to Play — azure-pipelines.yml produces that one.
#
# Either way, Google Play re-signs installs with the Play App Signing key, so a
# sideloaded APK and a Play install can never update one another. That caveat is
# repeated in the release body for users.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v1.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

# Two runs publishing the same tag would race over the release assets.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Deny by default. The job below grants itself only `contents: write`, which is
# what `gh release` needs — nothing else.
permissions: {}

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      # Fail before doing 10 minutes of work if signing material is missing:
      # an unsigned APK would otherwise build fine and reach users as a dud.
      - name: Check signing secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [ -z "${!name}" ] && missing="$missing $name"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secret(s):$missing"
            exit 1
          fi

      - name: Check out the tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      # Fails the build if gradle-wrapper.jar was tampered with.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      # The runner image does not necessarily ship the exact compileSdk.
      - name: Install Android SDK platform 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" > /dev/null

      # A tag pointing at a commit with a stale versionName would only be caught
      # by the Play Console, long after the release is public.
      - name: Check versionName matches the tag
        run: |
          version_name="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          echo "versionName=$version_name tag=$TAG"
          if [ "v$version_name" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match versionName $version_name"
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Run Android Lint
        run: ./gradlew --no-daemon lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*

      # Written outside the workspace so it can never be picked up by a build
      # step, an artifact upload, or a stray `git add`.
      - name: Decode testing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/testing-keystore.jks"

      # Only assembleRelease: an AAB signed with the testing key is worthless,
      # because Play only accepts the upload key. azure-pipelines.yml builds that.
      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/testing-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      # Without this an unsigned APK sails through here and only fails on the
      # tester's device.
      - name: Verify APK signature
        run: |
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)"
          "$apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Shred the keystore
        if: always()
        run: shred -u "$RUNNER_TEMP/testing-keystore.jks" 2>/dev/null || true

      # Only the APK goes public: testers install that. The R8 mapping merely
      # helps someone reverse-engineer the app, so it stays a repo artifact.
      - name: Name the artifacts after the release
        run: |
          mkdir -p dist private
          cp app/build/outputs/apk/release/app-release.apk "dist/FairTrack-$TAG.apk"
          # Needed to read stack traces from testers running this exact build.
          cp app/build/outputs/mapping/release/mapping.txt "private/mapping-$TAG.txt"
          sha256sum dist/*.apk private/* > "dist/checksums-$TAG.txt"
          cat "dist/checksums-$TAG.txt"

      - name: Upload R8 mapping (repo members only)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mapping-${{ env.TAG }}
          path: private/
          retention-days: 90

      # `gh` ships on the runner, so no third-party action gets access to the
      # freshly signed binaries. --notes-file keeps the body out of the YAML.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          cat > release-notes.md <<'NOTES'
          ## Installation

          Lade die `.apk` herunter und installiere sie direkt. Diese Version ist für
          Tester gedacht.

          Sie ist mit einem eigenen Testing-Schlüssel signiert, nicht mit dem, den
          Google Play verteilt. Ein sideloadetes APK und eine Installation aus dem
          Play Store können einander deshalb **nicht** aktualisieren — wer die App aus
          dem Store hat, muss sie erst deinstallieren, und umgekehrt.

          Die Prüfsummen der Datei stehen in `checksums-<version>.txt`.
          NOTES

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — replacing its assets."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "FairTrack ${TAG#v}" \
              --generate-notes \
              --notes-file release-notes.md \
              --verify-tag \
              $PRERELEASE
          fi
