# CodeQL static analysis for the Kotlin/Java sources.
#
# Runs on pushes to main, on pull requests, and weekly. It has to compile the app
# every time, so it is slower than the plain CI job — but the push run is what
# GitHub uses to populate the Security tab, and the weekly run picks up newly
# published queries for code that has not changed in months.

name: CodeQL

on:
  # Both hooks are needed: the pull_request run annotates the diff, while the
  # push run on main is what populates the Security tab. Without the push hook
  # GitHub has no baseline and the alerts never appear there.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays, 05:17 UTC. Off the hour on purpose: scheduled jobs queue up on
    # round numbers and GitHub silently drops the overflow.
    - cron: '17 5 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  analyze:
    name: Analyze java-kotlin
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the Security tab.
      security-events: write
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      # The runner image does not necessarily ship the exact compileSdk.
      - name: Install Android SDK platform 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          # security-extended adds lower-severity queries the default pack skips.
          queries: security-extended

      # CodeQL observes the compiler, so it needs a real build. Debug is enough
      # and avoids dragging signing secrets into an analysis job.
      - name: Compile debug sources
        run: ./gradlew --no-daemon :app:compileDebugKotlin :app:compileDebugJavaWithJavac

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:java-kotlin
